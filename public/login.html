<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Login — StayBook</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0d9488; --teal-d:#0f766e; --teal-l:#99f6e4; --teal-bg:#f0fdfa;
  --ink:#0f172a; --ink2:#334155; --muted:#94a3b8; --border:#e2e8f0;
  --surface:#f8fafc; --white:#ffffff;
  --red:#ef4444; --red-bg:#fee2e2;
  --shadow-lg:0 12px 40px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);color:var(--ink);display:flex;align-items:center;justify-content:center}

.login-container{width:100%;max-width:400px;margin:20px;background:var(--white);border-radius:24px;box-shadow:var(--shadow-lg);overflow:hidden}

.login-header{background:var(--teal-bg);padding:40px 30px;text-align:center;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
.logo-stay{color:var(--teal-d)} .logo-book{color:var(--ink)}
.tagline{font-size:13px;color:var(--muted);font-weight:500}

.login-body{padding:35px 30px 40px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:8px;letter-spacing:0.2px}
.form-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;color:var(--ink);transition:all .2s;background:var(--white)}
.form-input:focus{outline:none;border-color:var(--teal);background:var(--teal-bg)}
.form-input::placeholder{color:var(--muted)}

.login-btn{width:100%;padding:16px;background:var(--teal);color:var(--white);border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:10px;letter-spacing:0.3px}
.login-btn:hover{background:var(--teal-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,148,136,.3)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}

.error-msg{display:none;background:var(--red-bg);color:var(--red);padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;border-left:3px solid var(--red);font-weight:500}
.error-msg.show{display:block;animation:shake .4s}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.demo-info{background:var(--surface);padding:16px;border-radius:12px;margin-top:25px;border:1px solid var(--border)}
.demo-info-title{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.demo-info-text{font-size:13px;color:var(--muted);line-height:1.5}
.demo-creds{margin-top:8px;padding:8px 12px;background:var(--white);border-radius:8px;font-family:monospace;font-size:12px;color:var(--teal-d)}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">
      <span class="logo-stay">Stay</span><span class="logo-book">Book</span>
    </div>
    <div class="tagline">Host Calendar Management</div>
  </div>
  
  <div class="login-body">
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">
        Login
      </button>
    </form>
    
    <div class="demo-info">
      <div class="demo-info-title">Demo Credentials</div>
      <div class="demo-info-text">Use these credentials to login:</div>
      <div class="demo-creds">
        Username: <strong>admin</strong><br>
        Password: <strong>admin123</strong>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = window.location.origin;

(async function bootstrapLogin() {
  const token = localStorage.getItem('staybook_token');
  if (!token) return;

  try {
    const response = await fetch(`${API_URL}/api/auth/verify`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (response.ok) {
      window.location.href = '/app';
    } else {
      localStorage.removeItem('staybook_token');
      localStorage.removeItem('staybook_user');
    }
  } catch (_) {
    localStorage.removeItem('staybook_token');
    localStorage.removeItem('staybook_user');
  }
})();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const loginBtn = document.getElementById('loginBtn');
  
  errorMsg.classList.remove('show');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Logging in...';
  
  try {
    const response = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      localStorage.setItem('staybook_token', data.token);
      localStorage.setItem('staybook_user', data.username);
      window.location.href = '/app';
    } else {
      errorMsg.textContent = data.error || 'Login failed. Please try again.';
      errorMsg.classList.add('show');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  } catch (error) {
    errorMsg.textContent = 'Network error. Please check your connection.';
    errorMsg.classList.add('show');
    loginBtn.disabled = false;
    loginBtn.textContent = 'Login';
  }
});
</script>
</body>
</html>
